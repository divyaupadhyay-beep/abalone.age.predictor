<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abalone Age Predictor 🐚</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --deep:        #020c18;
      --ocean:       #0a3d6b;
      --reef:        #0e6ba8;
      --surf:        #00b4d8;
      --foam:        #90e0ef;
      --white:       #e8f8ff;
      --gold:        #f4c430;
      --coral:       #ff6b6b;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: var(--deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      overflow-x: hidden;
      padding: 40px 16px 100px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(6,32,64,0.9) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(10,61,107,0.6) 0%, transparent 50%),
        linear-gradient(180deg, #020c18 0%, #041e3a 40%, #062a55 70%, #083060 100%);
      z-index: -3;
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      background: var(--surf);
      opacity: 0;
      animation: drift linear infinite;
      z-index: -2;
      pointer-events: none;
    }

    @keyframes drift {
      0%   { transform: translateY(100vh) translateX(0) scale(0);    opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(30px) scale(1.3); opacity: 0; }
    }

    .waves-container {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 170px;
      z-index: -1;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      bottom: 0; left: -200px;
      width: calc(100% + 400px);
      height: 100%;
    }

    .wave svg { width: 100%; height: 100%; animation: waveScroll linear infinite; }
    .wave:nth-child(1) svg { animation-duration: 6s;  fill: rgba(10,61,107,0.75); }
    .wave:nth-child(2) svg { animation-duration: 9s;  fill: rgba(14,107,168,0.5); animation-direction: reverse; }
    .wave:nth-child(3) svg { animation-duration: 13s; fill: rgba(0,180,216,0.28); }

    @keyframes waveScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(200px); }
    }

    .site-header {
      text-align: center;
      margin-bottom: 34px;
      animation: riseUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    .shell-icon {
      font-size: 62px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 22px var(--surf));
      animation: bobble 3s ease-in-out infinite;
    }

    @keyframes bobble {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-9px); }
    }

    .site-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--foam), var(--surf), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,180,216,0.5));
    }

    .site-header p {
      margin-top: 9px;
      font-size: 13px;
      color: var(--foam);
      letter-spacing: 3.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(160deg, rgba(6,32,64,0.93), rgba(4,18,37,0.97));
      border: 1px solid rgba(0,180,216,0.28);
      border-radius: 26px;
      padding: 42px 38px 38px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(0,180,216,0.08),
        0 10px 50px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(144,224,239,0.14),
        0 0 90px rgba(0,180,216,0.07);
      animation: riseUp 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--surf), transparent);
    }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--surf);
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0.8;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 8px;
    }

    .form-group { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--foam);
    }

    .hint {
      font-weight: 400;
      font-size: 10px;
      color: rgba(144,224,239,0.45);
      text-transform: none;
      letter-spacing: 0;
    }

    input[type="number"] {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(0,180,216,0.22);
      border-radius: 10px;
      color: var(--white);
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]::placeholder { color: rgba(144,224,239,0.28); }
    input[type="number"]:focus {
      border-color: var(--surf);
      background: rgba(0,180,216,0.07);
      box-shadow: 0 0 0 4px rgba(0,180,216,0.11), 0 0 22px rgba(0,180,216,0.09);
    }

    .btn-wrapper { margin-top: 28px; }

    .btn {
      position: relative;
      width: 100%;
      padding: 17px 24px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--deep);
      background: linear-gradient(90deg, var(--surf) 0%, var(--foam) 50%, var(--gold) 100%);
      background-size: 200% 100%;
      box-shadow:
        0 6px 30px rgba(0,180,216,0.45),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.15s, box-shadow 0.2s, background-position 0.4s;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      bottom: -7px; left: -60%;
      width: 220%; height: 28px;
      background: rgba(255,255,255,0.22);
      border-radius: 50%;
      animation: rollWave 2.2s ease-in-out infinite;
    }

    .btn::after {
      content: '';
      position: absolute;
      bottom: -4px; left: -40%;
      width: 180%; height: 18px;
      background: rgba(255,255,255,0.13);
      border-radius: 50%;
      animation: rollWave 2.9s 0.5s ease-in-out infinite reverse;
    }

    @keyframes rollWave {
      0%,100% { transform: translateX(-5%)  scaleY(1);   }
      50%      { transform: translateX(10%) scaleY(1.5); }
    }

    .btn:hover {
      transform: translateY(-3px);
      background-position: 100% 0;
      box-shadow:
        0 14px 44px rgba(0,180,216,0.6),
        0 4px 16px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .btn:active { transform: translateY(1px); box-shadow: 0 3px 14px rgba(0,180,216,0.4); }
    .btn-text { position: relative; z-index: 2; }

    #loader {
      display: none;
      margin-top: 28px;
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid rgba(0,180,216,0.35);
      height: 86px;
      position: relative;
      background: rgba(2,12,24,0.85);
    }

    #loader .water-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0;
      background: linear-gradient(180deg, rgba(0,180,216,0.55), rgba(14,107,168,0.88));
      animation: fillUp 1.6s ease-out forwards;
    }

    @keyframes fillUp {
      0%   { height: 0%; }
      100% { height: 100%; }
    }

    #loader .wave-sway {
      position: absolute;
      top: 0; left: -50%;
      width: 200%; height: 28px;
      background: rgba(0,180,216,0.45);
      border-radius: 50%;
      animation: sway 0.85s ease-in-out infinite alternate;
    }

    @keyframes sway {
      from { transform: translateX(-6%); }
      to   { transform: translateX(6%); }
    }

    #loader .loader-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--foam);
      z-index: 2;
      text-transform: uppercase;
    }

    #result-box {
      display: none;
      margin-top: 28px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    #result-box.success {
      background: linear-gradient(135deg, rgba(0,58,88,0.96), rgba(2,20,50,0.98));
      border: 1.5px solid var(--surf);
      box-shadow: 0 0 45px rgba(0,180,216,0.22), inset 0 0 32px rgba(0,180,216,0.05);
      padding: 32px 28px;
      text-align: center;
      animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    #result-box.success::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, transparent, var(--surf), var(--foam), transparent);
      animation: shimmerLine 2.2s ease-in-out infinite;
    }

    @keyframes shimmerLine {
      0%,100% { opacity: 0.35; transform: scaleX(0.75); }
      50%      { opacity: 1;   transform: scaleX(1); }
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(0.92) translateY(10px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }

    #result-box.error {
      background: rgba(75,10,18,0.85);
      border: 1.5px solid rgba(255,107,107,0.5);
      padding: 20px 24px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .result-eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--surf); margin-bottom: 10px;
    }

    #result-value {
      font-family: 'Cinzel', serif;
      font-size: 76px; font-weight: 900; line-height: 1;
      background: linear-gradient(90deg, var(--surf), var(--foam), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(0,180,216,0.5));
      margin-bottom: 8px;
      animation: countUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes countUp {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-unit {
      font-size: 12px; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--foam); opacity: 0.6;
    }

    #error-msg { font-size: 14px; color: #ff9f9f; font-weight: 600; }

    .bubbles {
      position: absolute; bottom: 0; left: 0; right: 0; top: 0;
      overflow: hidden; pointer-events: none; z-index: 0;
    }

    .bubble {
      position: absolute; bottom: -20px; border-radius: 50%;
      background: rgba(0,180,216,0.18);
      border: 1px solid rgba(0,180,216,0.3);
      animation: riseUp linear infinite;
    }

    .result-inner { position: relative; z-index: 1; }

    .divider { border: none; border-top: 1px solid rgba(0,180,216,0.1); margin: 32px 0 16px; }

    .footer-note {
      text-align: center; font-size: 11px;
      color: rgba(144,224,239,0.28);
      letter-spacing: 2px; text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 18px; }
      .input-grid { grid-template-columns: 1fr; }
      #result-value { font-size: 58px; }
    }
  </style>
</head>
<body>

  <!-- Particles -->
  <div class="particle" style="width:4px;height:4px;left:8%;animation-duration:8s;animation-delay:0s"></div>
  <div class="particle" style="width:3px;height:3px;left:22%;animation-duration:11s;animation-delay:2s"></div>
  <div class="particle" style="width:5px;height:5px;left:39%;animation-duration:7s;animation-delay:1s"></div>
  <div class="particle" style="width:3px;height:3px;left:58%;animation-duration:13s;animation-delay:3.5s"></div>
  <div class="particle" style="width:4px;height:4px;left:73%;animation-duration:9s;animation-delay:0.5s"></div>
  <div class="particle" style="width:6px;height:6px;left:87%;animation-duration:10s;animation-delay:1.5s"></div>
  <div class="particle" style="width:3px;height:3px;left:5%;animation-duration:15s;animation-delay:4s"></div>
  <div class="particle" style="width:4px;height:4px;left:50%;animation-duration:6s;animation-delay:2.5s"></div>
  <div class="particle" style="width:5px;height:5px;left:94%;animation-duration:12s;animation-delay:0.8s"></div>

  <!-- Bottom waves -->
  <div class="waves-container">
    <div class="wave">
      <svg viewBox="0 0 1440 170" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,85 C180,145 360,25 540,85 C720,145 900,25 1080,85 C1260,145 1440,65 1440,85 L1440,170 L0,170 Z"/>
      </svg>
    </div>
    <div class="wave">
      <svg viewBox="0 0 1440 170" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,105 C200,45 400,145 600,105 C800,65 1000,145 1200,105 C1310,85 1390,115 1440,105 L1440,170 L0,170 Z"/>
      </svg>
    </div>
    <div class="wave">
      <svg viewBox="0 0 1440 170" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,125 C240,65 480,165 720,125 C960,85 1200,165 1440,125 L1440,170 L0,170 Z"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <span class="shell-icon">🐚</span>
    <h1>ABALONE AGE PREDICTOR</h1>
    <p>Deep Sea Intelligence &nbsp;·&nbsp; Marine Biology ML</p>
  </header>

  <!-- Card -->
  <div class="card">
    <div class="section-label">📡 Enter Measurements</div>

    <div class="input-grid">
      <div class="form-group">
        <label for="length">Length <span class="hint">(mm)</span></label>
        <input type="number" id="length" placeholder="e.g. 0.455" step="any" min="0"/>
      </div>
      <div class="form-group">
        <label for="diameter">Diameter <span class="hint">(mm)</span></label>
        <input type="number" id="diameter" placeholder="e.g. 0.365" step="any" min="0"/>
      </div>
      <div class="form-group">
        <label for="height">Height <span class="hint">(mm)</span></label>
        <input type="number" id="height" placeholder="e.g. 0.095" step="any" min="0"/>
      </div>
      <div class="form-group">
        <label for="weight">Whole Weight <span class="hint">(g)</span></label>
        <input type="number" id="weight" placeholder="e.g. 0.514" step="any" min="0"/>
      </div>
    </div>

    <div class="btn-wrapper">
      <button class="btn" onclick="runPrediction()">
        <span class="btn-text">🌊 &nbsp; Dive Deep &amp; Predict</span>
      </button>
    </div>

    <!-- Water loader -->
    <div id="loader">
      <div class="water-fill"></div>
      <div class="wave-sway"></div>
      <div class="loader-label">🌊 &nbsp; Diving Deep...</div>
    </div>

    <!-- Result -->
    <div id="result-box">
      <div class="bubbles">
        <div class="bubble" style="width:13px;height:13px;left:9%;animation-duration:3s;animation-delay:.2s"></div>
        <div class="bubble" style="width:7px;height:7px;left:28%;animation-duration:4s;animation-delay:.7s"></div>
        <div class="bubble" style="width:17px;height:17px;left:53%;animation-duration:2.6s;animation-delay:.1s"></div>
        <div class="bubble" style="width:9px;height:9px;left:74%;animation-duration:3.5s;animation-delay:.5s"></div>
        <div class="bubble" style="width:5px;height:5px;left:91%;animation-duration:5s;animation-delay:1s"></div>
      </div>
      <div class="result-inner" id="success-content">
        <div class="result-eyebrow">🔬 &nbsp; Predicted Age</div>
        <div id="result-value">—</div>
        <div class="result-unit">Years &nbsp;·&nbsp; Estimated</div>
      </div>
      <div class="result-inner" id="error-content" style="display:none;">
        <p id="error-msg"></p>
      </div>
    </div>

    <hr class="divider"/>
    <p class="footer-note">🌊 &nbsp; HTML · CSS · JS &nbsp;·&nbsp; Abalone Dataset &nbsp;·&nbsp; 2025</p>
  </div>

  <script>
    function runPrediction() {
      var length   = document.getElementById('length').value.trim();
      var diameter = document.getElementById('diameter').value.trim();
      var height   = document.getElementById('height').value.trim();
      var weight   = document.getElementById('weight').value.trim();
      var loader    = document.getElementById('loader');
      var resultBox = document.getElementById('result-box');

      resultBox.style.display = 'none';
      resultBox.className = '';
      loader.style.display = 'none';

      if (!length || !diameter || !height || !weight) {
        showError('⚠️ Please fill in all four measurement fields!');
        return;
      }

      var l = parseFloat(length), d = parseFloat(diameter),
          h = parseFloat(height), w = parseFloat(weight);

      if (isNaN(l) || isNaN(d) || isNaN(h) || isNaN(w)) {
        showError('⚠️ Invalid input! Please enter numeric values only.');
        return;
      }

      if (l <= 0 || d <= 0 || h <= 0 || w <= 0) {
        showError('⚠️ All values must be positive numbers greater than zero.');
        return;
      }

      loader.style.display = 'block';
      var fill = loader.querySelector('.water-fill');
      fill.style.animation = 'none';
      void fill.offsetWidth;
      fill.style.animation = 'fillUp 1.6s ease-out forwards';

      setTimeout(function() {
        loader.style.display = 'none';
        var age = Math.round((l + d + h + w) * 5 * 100) / 100;
        showSuccess(age);
      }, 1800);
    }

    function showSuccess(age) {
      var resultBox = document.getElementById('result-box');
      var resultVal = document.getElementById('result-value');
      document.getElementById('success-content').style.display = 'block';
      document.getElementById('error-content').style.display   = 'none';
      resultVal.textContent = age;
      resultBox.className = 'success';
      resultBox.style.display = 'block';
      resultVal.style.animation = 'none';
      void resultVal.offsetWidth;
      resultVal.style.animation = 'countUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both';
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(msg) {
      var resultBox = document.getElementById('result-box');
      document.getElementById('success-content').style.display = 'none';
      document.getElementById('error-content').style.display   = 'block';
      document.getElementById('error-msg').textContent = msg;
      resultBox.className = 'error';
      resultBox.style.display = 'block';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') runPrediction();
    });
  </script>s

</body>
</html>
